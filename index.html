<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="stylesheet.css">
    <link rel="stylesheet" href="fonts/fonts.css">

    <title>Homepage</title>
    <link rel="icon" type="image/x-icon" href="images/10th-prestige.gif">

</head>
<body>
    <audio id="menu">
        <source src="menu.ogg" type="audio/mpeg">
    </audio>

    
    <div class="blur"></div>
    <div class="ghost">
        <div class="smokescroll-2"></div>
        <div class="smokescroll"></div>
            
        <img class="background" src="images/sp-bg-fullres.png" alt="">
        <div class="flare"></div>
    </div>
    <div class="container">
        <h1>"Homepage"</h1>
        <ul class="list">
            <li><a href="https://old.reddit.com/" target="_blank">REDDIT</a></li>
            <li><a href="https://www.youtube.com/" target="_blank">YOUTUBE</a></li>
            <li><a href="https://account.proton.me/mail" target="_blank">PROTONMAIL</a></li>
        </ul>
        <img class="divider" src="images/gradient-divider.png" alt="">
        <ul class="list">
            <li><a href="https://www.udemy.com/" target="_blank">UDEMY</a></li>
            <li><a href="https://www.w3schools.com/" target="_blank">W3 SCHOOLS</a></li>
            <li><a href="https://github.com/" target="_blank">GITHUB</a></li>
            <li><a href="https://nbabite.pro/" target="_blank">NBABITE</a></li>
            <li><a href="https://bflix.la/" target="_blank">BFLIX</a></li>
            <li><a href="https://monkeytype.com/" target="_blank">MONKEYTYPE</a></li>
            <li><a href="https://chatgpt.com/" target="_blank">CHATGPT</a></li>
        </ul>
        <img class="divider" src="images/gradient-divider.png" alt="">
        <li>
            <a href="#" id="playButton" class="paused" onclick="togglePlay(event)">PLAY</a>
        </li>
    </div>

    <img class="title" src="images/logo.png" alt="">

    <audio id="hoverSound" src="select.ogg" preload="auto"></audio>
    <audio id="hoverSound" src="click.ogg" preload="auto"></audio>

<script>
 function togglePlay(event) {
    event.preventDefault(); // Prevent page jump

    var audio = document.getElementById("menu");
    var link = document.getElementById("playButton");

    if (audio.paused) {
        audio.play();
        link.textContent = "PAUSE";
        link.classList.remove("paused");
        link.classList.add("playing");
    } else {
        audio.pause();
        link.textContent = "PLAY";
        link.classList.remove("playing");
        link.classList.add("paused");
    }
}

const links = document.querySelectorAll("a");

const hoverSoundSrc = "select.ogg";
const clickSoundSrc = "click.ogg";

links.forEach(link => {

    // Play hover sound for all links
    link.addEventListener("mouseenter", () => {
        const sound = new Audio(hoverSoundSrc);
        sound.volume = 1;
        sound.play();
    });

    // Play click sound for all links except the play/pause button
    link.addEventListener("click", (e) => {
        if (link.id !== "playButton") {  // <-- ADDED LINE**
            const sound = new Audio(clickSoundSrc);
            sound.volume = 1;
            sound.play();
        }  // <-- ADDED LINE**
    });

});
</script>

</body>
</html>
