    <audio id="hoverSound" src="select.ogg" preload="auto"></audio>

<script>
  const links = document.querySelectorAll("a");
  const audioSrc = "select.ogg"; // path to your sound

  links.forEach(link => {
    link.addEventListener("mouseenter", function () {
      const sound = new Audio(audioSrc);
      sound.volume = 1;
      sound.play();
    });
  });
</script>
