<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="stylesheet.css">
    <link rel="stylesheet" href="fonts/fonts.css">

    <title>Homepage</title>
    <link rel="icon" type="image/x-icon" href="images/10th-prestige.gif">

</head>
<body>
    
    <div class="blur"></div>
    <div class="ghost">
        <div class="smokescroll-2"></div>
        <div class="smokescroll"></div>
            
        <img class="background" src="images/sp-bg-fullres.png" alt="">
        <div class="flare"></div>
    </div>
    <div class="container">
        <h1>"Homepage"</h1>
        <ul class="list">
            <li><a href="https://old.reddit.com/"  id="hoverLink">REDDIT</a></li>
            <li><a href="https://www.youtube.com/"  id="hoverLink">YOUTUBE</a></li>
            <li><a href="https://account.proton.me/mail"  id="hoverLink">PROTONMAIL</a></li>
        </ul>
        <img class="divider" src="images/gradient-divider.png" alt="">
        <ul class="list">
            <li><a href="https://www.udemy.com/" id="hoverLink">UDEMY</a></li>
            <li><a href="https://www.w3schools.com/" id="hoverLink">W3 SCHOOLS</a></li>
            <li><a href="https://github.com/" id="hoverLink">GITHUB</a></li>
            <li><a href="https://bflix.la/" id="hoverLink">BFLIX</a></li>
            <li><a href="https://monkeytype.com/" id="hoverLink">MONKEYTYPE</a></li>
            <li><a href="https://chatgpt.com/" id="hoverLink">CHATGPT</a></li>
        </ul>
    </div>

    <img class="title" src="images/logo.png" alt="">

    <audio id="hoverSound" src="select.ogg" preload="auto"></audio>

    <script>
    const link = document.getElementById("hoverLink");
    const sound = document.getElementById("hoverSound");

    link.addEventListener("mouseenter", function () {
        sound.currentTime = 0; // rewind to start
        sound.play();
    });
    </script>
</body>
</html>
